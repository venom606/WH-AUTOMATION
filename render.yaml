services:
  - type: web
    name: wa-automation
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: wa-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
